; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.filesystem = littlefs
; https://community.platformio.org/t/enable-opi-psram-and-16mb-qio80mhz-of-flash/32693/2
build_flags = 
    -DBOARD_HAS_PSRAM
    -D LOG_ENABLED
    -DCORE_DEBUG_LEVEL=5
board_build.arduino.memory_type = qio_opi
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
monitor_speed = 115200


lib_extra_dirs = ~/Documents/Arduino/libraries
lib_deps =
    GxEPD2
    Adafruit GFX Library

monitor_filters = esp32_exception_decoder
; or esp8266_exception_decoder for ESP8266 boards

[env:native]
platform = native
; board = esp32dev
; framework = arduino
; board_build.filesystem = littlefs
; test_build_project_src = false
; targets = test
; # enable C++11 extensions
build_flags =
  -std=c++11
lib_deps =
;   https://github.com/leethomason/tinyxml2.git
    ; https://github.com/arduino/ArduinoCore-avr.git
    ; https://registry.platformio.org/search?q=header:Arduino.h
    ; https://github.com/e spressif/esp-idf.git

; lib_ignore = 
;   touch
;   epdiy
;   sd_card
;   spiffs
;   FT6X36
;   m5Paper
debug_test = *